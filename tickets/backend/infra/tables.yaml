AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB tables for the NSMT ticketing platform

Resources:

  OrgsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: nsmt-orgs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orgId
          AttributeType: S
      KeySchema:
        - AttributeName: orgId
          KeyType: HASH

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: nsmt-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orgId
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: orgId
          KeyType: HASH
        - AttributeName: eventId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: slug-index
          KeySchema:
            - AttributeName: orgId
              KeyType: HASH
            - AttributeName: slug
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  TiersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: nsmt-ticket-tiers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: tierId
          AttributeType: S
        - AttributeName: orgId
          AttributeType: S
      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
        - AttributeName: tierId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: orgId-eventId-index
          KeySchema:
            - AttributeName: orgId
              KeyType: HASH
            - AttributeName: eventId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: nsmt-orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: orgId
          AttributeType: S
        - AttributeName: buyerEmail
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
        - AttributeName: orgId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: buyerEmail
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: event-index
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  TicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: nsmt-tickets
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ticketId
          AttributeType: S
        - AttributeName: eventId
          AttributeType: S
        - AttributeName: checkedIn
          AttributeType: S
      KeySchema:
        - AttributeName: ticketId
          KeyType: HASH
        - AttributeName: eventId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: event-checkin-index
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: checkedIn
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  OrdersStreamArn:
    Description: DynamoDB Stream ARN for nsmt-orders — wire to tickets-email-trigger Lambda
    Value: !GetAtt OrdersTable.StreamArn
    Export:
      Name: nsmt-orders-stream-arn
