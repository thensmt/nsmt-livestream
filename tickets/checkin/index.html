<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NSMT Check-in</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue:  #0E80FC;
      --black: #000;
      --white: #fff;
      --green: #22c55e;
      --yellow:#f59e0b;
      --red:   #ef4444;
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--black);
      color: var(--white);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--black);
      border-bottom: 1px solid #222;
      flex-shrink: 0;
      min-height: 60px;
    }
    #header .brand { color: var(--blue); font-weight: 700; font-size: 20px; letter-spacing: 0.05em; }
    #header .event-name { font-size: 14px; color: #aaa; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #header .counter { font-size: 13px; color: #aaa; text-align: right; }
    #header .counter strong { color: var(--white); font-size: 16px; }

    /* ── Camera view ─────────────────────────────────────────── */
    #scanner-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #canvas { display: none; }
    /* Viewfinder overlay */
    #viewfinder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #viewfinder .frame {
      width: min(65vw, 280px);
      height: min(65vw, 280px);
      border: 3px solid rgba(255,255,255,0.5);
      border-radius: 12px;
      position: relative;
    }
    #viewfinder .frame::before, #viewfinder .frame::after,
    #viewfinder .frame span::before, #viewfinder .frame span::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--blue);
      border-style: solid;
    }
    #viewfinder .frame::before { top: -3px; left: -3px; border-width: 3px 0 0 3px; border-radius: 10px 0 0 0; }
    #viewfinder .frame::after  { top: -3px; right: -3px; border-width: 3px 3px 0 0; border-radius: 0 10px 0 0; }
    #viewfinder .frame span::before { bottom: -3px; left: -3px; border-width: 0 0 3px 3px; border-radius: 0 0 0 10px; }
    #viewfinder .frame span::after  { bottom: -3px; right: -3px; border-width: 0 3px 3px 0; border-radius: 0 0 10px 0; }

    /* ── Result overlay ──────────────────────────────────────── */
    #result-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      transition: background 0.15s;
    }
    #result-overlay.show { display: flex; }
    #result-overlay.ok     { background: rgba(34,197,94,0.95); }
    #result-overlay.dupe   { background: rgba(239,68,68,0.95); }
    #result-overlay.invalid{ background: rgba(30,30,30,0.97); border: 3px solid var(--red); }

    #result-icon  { font-size: 96px; line-height: 1; margin-bottom: 16px; }
    #result-title { font-size: 48px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; }
    #result-name  { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
    #result-tier  { font-size: 20px; color: rgba(255,255,255,0.8); margin-bottom: 6px; }
    #result-time  { font-size: 15px; color: rgba(255,255,255,0.7); }

    /* ── Bottom bar ──────────────────────────────────────────── */
    #bottom-bar {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      background: var(--black);
      border-top: 1px solid #222;
      flex-shrink: 0;
    }
    button {
      height: 60px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    button:active { opacity: 0.75; }
    #btn-manual {
      flex: 1;
      background: #222;
      color: var(--white);
    }
    #btn-switch {
      width: 60px;
      background: #222;
      color: var(--white);
      font-size: 22px;
    }
    #btn-event {
      flex: 1;
      background: var(--blue);
      color: var(--white);
    }

    /* ── Offline badge ───────────────────────────────────────── */
    #offline-badge {
      display: none;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--yellow);
      color: var(--black);
      font-size: 13px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      z-index: 10;
    }
    #offline-badge.show { display: block; }

    /* ── Setup screen ────────────────────────────────────────── */
    #setup-screen {
      position: fixed;
      inset: 0;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 100;
    }
    #setup-screen h1 { color: var(--blue); font-size: 32px; font-weight: 800; margin-bottom: 8px; }
    #setup-screen p  { color: #aaa; margin-bottom: 32px; text-align: center; }
    .field { width: 100%; margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .field input {
      width: 100%;
      height: 60px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: var(--white);
      font-size: 17px;
      padding: 0 16px;
      outline: none;
    }
    .field input:focus { border-color: var(--blue); }
    #btn-start {
      width: 100%;
      height: 64px;
      background: var(--blue);
      color: var(--white);
      font-size: 20px;
      border-radius: 12px;
      margin-top: 8px;
    }
    #setup-error { color: var(--red); font-size: 14px; margin-top: 12px; min-height: 20px; }

    /* ── Manual lookup modal ─────────────────────────────────── */
    #manual-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: flex-end;
      z-index: 200;
    }
    #manual-modal.show { display: flex; }
    #manual-sheet {
      background: #1a1a1a;
      border-radius: 16px 16px 0 0;
      padding: 24px;
      width: 100%;
    }
    #manual-sheet h2 { font-size: 20px; margin-bottom: 16px; }
    #manual-input {
      width: 100%;
      height: 60px;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: var(--white);
      font-size: 18px;
      padding: 0 16px;
      outline: none;
      margin-bottom: 12px;
    }
    #manual-input:focus { border-color: var(--blue); }
    .modal-btns { display: flex; gap: 10px; }
    #btn-manual-cancel { flex: 1; background: #333; color: var(--white); border-radius: 10px; }
    #btn-manual-submit { flex: 2; background: var(--blue); color: var(--white); border-radius: 10px; }
  </style>
</head>
<body>

<!-- Setup screen (shown until event is selected and PIN entered) -->
<div id="setup-screen">
  <h1>NSMT</h1>
  <p>Check-in Scanner</p>
  <div class="field">
    <label>API Base URL</label>
    <input id="input-api" type="url" placeholder="https://..." value="">
  </div>
  <div class="field">
    <label>Event ID</label>
    <input id="input-event" type="text" placeholder="evt_...">
  </div>
  <div class="field">
    <label>PIN</label>
    <input id="input-pin" type="password" inputmode="numeric" placeholder="4-digit PIN">
  </div>
  <div class="field">
    <label>Device Name</label>
    <input id="input-device" type="text" placeholder="ipad-door-1">
  </div>
  <button id="btn-start">Start Check-in</button>
  <div id="setup-error"></div>
</div>

<!-- Main scanner UI -->
<div id="header">
  <div>
    <div class="brand">NSMT</div>
    <div class="event-name" id="event-name-display">—</div>
  </div>
  <div class="counter">
    Checked in<br>
    <strong id="counter-display">—</strong>
  </div>
</div>

<div id="scanner-wrap">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas"></canvas>

  <div id="viewfinder">
    <div class="frame"><span></span></div>
  </div>

  <div id="offline-badge">● <span id="offline-count">0</span> pending sync</div>

  <div id="result-overlay">
    <div id="result-icon"></div>
    <div id="result-title"></div>
    <div id="result-name"></div>
    <div id="result-tier"></div>
    <div id="result-time"></div>
  </div>
</div>

<div id="bottom-bar">
  <button id="btn-manual">Manual Lookup</button>
  <button id="btn-switch">⟳</button>
  <button id="btn-event">Change Event</button>
</div>

<!-- Manual lookup modal -->
<div id="manual-modal">
  <div id="manual-sheet">
    <h2>Enter Ticket ID</h2>
    <input id="manual-input" type="text" placeholder="tkt_..." autocapitalize="none" autocorrect="off">
    <div class="modal-btns">
      <button id="btn-manual-cancel">Cancel</button>
      <button id="btn-manual-submit">Check In</button>
    </div>
  </div>
</div>

<!-- jsQR — QR code decoder, no dependencies -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
const STATE = {
  apiBase:      '',
  eventId:      '',
  pin:          '',
  deviceId:     '',
  eventTitle:   '',
  validTicketIds: new Set(), // preloaded for instant offline validation
  checkedInCount: 0,
  totalCount:   0,
  scanning:     true,
  facingMode:   'environment',
  offlineQueue: [],
  stream:       null,
};

const STORAGE_KEY = 'nsmt-checkin-session';

// ── Setup screen ──────────────────────────────────────────────────────────────
const $setup      = document.getElementById('setup-screen');
const $inputApi   = document.getElementById('input-api');
const $inputEvent = document.getElementById('input-event');
const $inputPin   = document.getElementById('input-pin');
const $inputDev   = document.getElementById('input-device');
const $setupErr   = document.getElementById('setup-error');
const $btnStart   = document.getElementById('btn-start');

// Pre-fill from localStorage
const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
if (saved.apiBase)   $inputApi.value   = saved.apiBase;
if (saved.eventId)   $inputEvent.value = saved.eventId;
if (saved.deviceId)  $inputDev.value   = saved.deviceId;

$btnStart.addEventListener('click', async () => {
  $setupErr.textContent = '';
  const api     = $inputApi.value.trim().replace(/\/$/, '');
  const eventId = $inputEvent.value.trim();
  const pin     = $inputPin.value.trim();
  const device  = $inputDev.value.trim() || 'ipad-door-1';

  if (!api || !eventId || !pin) {
    $setupErr.textContent = 'All fields are required.';
    return;
  }

  $btnStart.textContent = 'Loading…';
  $btnStart.disabled = true;

  try {
    // Validate PIN + load event data + prefetch ticket IDs
    await initSession(api, eventId, pin, device);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ apiBase: api, eventId, deviceId: device }));
    $setup.style.display = 'none';
    startCamera();
  } catch (e) {
    $setupErr.textContent = e.message;
    $btnStart.textContent = 'Start Check-in';
    $btnStart.disabled = false;
  }
});

async function initSession(api, eventId, pin, device) {
  // Fetch event summary (also validates the API is reachable)
  const resp = await fetch(`${api}/tickets/admin/events/${eventId}/summary`);
  if (!resp.ok) throw new Error('Could not load event. Check the Event ID and API URL.');
  const data = await resp.json();

  // Validate PIN against event's checkinPin field (returned by summary if correct)
  // The summary endpoint returns pinValid: true when the PIN header matches.
  // For simplicity in v1, the summary response includes checkinPin which we compare client-side.
  // Note: for higher security, add a dedicated /tickets/checkin/auth endpoint.
  if (data.checkinPin && data.checkinPin !== pin) {
    throw new Error('Incorrect PIN.');
  }

  STATE.apiBase    = api;
  STATE.eventId    = eventId;
  STATE.pin        = pin;
  STATE.deviceId   = device;
  STATE.eventTitle = data.title || eventId;
  STATE.checkedInCount = data.checkedIn || 0;
  STATE.totalCount     = data.ticketsSold || 0;

  document.getElementById('event-name-display').textContent = STATE.eventTitle;
  updateCounter();

  // Prefetch all ticket IDs for offline validation
  try {
    const idsResp = await fetch(`${api}/tickets/admin/events/${eventId}/ticketIds`);
    if (idsResp.ok) {
      const idsData = await idsResp.json();
      STATE.validTicketIds = new Set(idsData.ticketIds || []);
      console.log(`Loaded ${STATE.validTicketIds.size} ticket IDs`);
    }
  } catch (_) {
    console.warn('Could not prefetch ticket IDs — offline local validation disabled');
  }

  // Load offline queue from storage
  STATE.offlineQueue = JSON.parse(localStorage.getItem('nsmt-checkin-queue') || '[]');
  updateOfflineBadge();
}

// ── Camera ────────────────────────────────────────────────────────────────────
const $video  = document.getElementById('video');
const $canvas = document.getElementById('canvas');
const $ctx    = $canvas.getContext('2d');
let   animFrame;
let   lastScannedId = '';
let   lastScannedAt = 0;

async function startCamera() {
  try {
    if (STATE.stream) STATE.stream.getTracks().forEach((t) => t.stop());
    STATE.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: STATE.facingMode },
      audio: false,
    });
    $video.srcObject = STATE.stream;
    await $video.play();
    requestAnimationFrame(scanFrame);
  } catch (e) {
    alert('Camera access denied or unavailable: ' + e.message);
  }
}

function scanFrame() {
  animFrame = requestAnimationFrame(scanFrame);
  if (!STATE.scanning || $video.readyState !== $video.HAVE_ENOUGH_DATA) return;

  $canvas.width  = $video.videoWidth;
  $canvas.height = $video.videoHeight;
  $ctx.drawImage($video, 0, 0, $canvas.width, $canvas.height);

  const imageData = $ctx.getImageData(0, 0, $canvas.width, $canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });

  if (!code) return;

  const ticketId = code.data.trim();

  // Debounce: ignore same ID scanned within 3 seconds
  const now = Date.now();
  if (ticketId === lastScannedId && (now - lastScannedAt) < 3000) return;
  lastScannedId = ticketId;
  lastScannedAt = now;

  processTicketId(ticketId);
}

// ── Check-in ──────────────────────────────────────────────────────────────────
async function processTicketId(ticketId) {
  STATE.scanning = false; // pause scanning during processing

  // Instant local rejection if ticket clearly doesn't exist
  if (STATE.validTicketIds.size > 0 && !STATE.validTicketIds.has(ticketId)) {
    showResult('invalid', '✗', 'INVALID', 'Ticket not found', '');
    return;
  }

  try {
    const resp = await fetch(`${STATE.apiBase}/tickets/checkin`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticketId, eventId: STATE.eventId, deviceId: STATE.deviceId }),
      signal: AbortSignal.timeout(5000),
    });

    const data = await resp.json();
    handleCheckinResult(data);
  } catch (e) {
    // Network failure — queue for retry
    STATE.offlineQueue.push({ ticketId, eventId: STATE.eventId, deviceId: STATE.deviceId, timestamp: new Date().toISOString() });
    localStorage.setItem('nsmt-checkin-queue', JSON.stringify(STATE.offlineQueue));
    updateOfflineBadge();
    // Optimistically show OK if ticket is in our valid set
    if (STATE.validTicketIds.has(ticketId)) {
      showResult('ok', '✓', 'OK', 'Queued for sync', '');
    } else {
      showResult('invalid', '!', 'OFFLINE', 'Queued — could not verify', '');
    }
  }
}

function handleCheckinResult(data) {
  const { result, buyerName, tierName, checkedInAt } = data;

  if (result === 'ok') {
    STATE.checkedInCount++;
    updateCounter();
    showResult('ok', '✓', 'VALID', buyerName || '', tierName || '');
  } else if (result === 'already_used') {
    const timeStr = checkedInAt ? new Date(checkedInAt).toLocaleTimeString() : '';
    showResult('dupe', '⚠', 'ALREADY SCANNED', buyerName || '', `Scanned at ${timeStr}`);
  } else {
    showResult('invalid', '✗', 'INVALID', 'Ticket not found', '');
  }
}

// ── Result overlay ────────────────────────────────────────────────────────────
const $overlay     = document.getElementById('result-overlay');
const $resultIcon  = document.getElementById('result-icon');
const $resultTitle = document.getElementById('result-title');
const $resultName  = document.getElementById('result-name');
const $resultTier  = document.getElementById('result-tier');
const $resultTime  = document.getElementById('result-time');
let   resultTimer;

function showResult(type, icon, title, name, extra) {
  clearTimeout(resultTimer);
  $overlay.className = `show ${type}`;
  $resultIcon.textContent  = icon;
  $resultTitle.textContent = title;
  $resultName.textContent  = name;
  $resultTier.textContent  = extra;
  $resultTime.textContent  = '';

  resultTimer = setTimeout(() => {
    $overlay.className = '';
    STATE.scanning = true;
  }, type === 'ok' ? 1800 : 2800);
}

// ── UI controls ───────────────────────────────────────────────────────────────
document.getElementById('btn-switch').addEventListener('click', () => {
  STATE.facingMode = STATE.facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

document.getElementById('btn-event').addEventListener('click', () => {
  if (confirm('Change event? You will need to re-enter the event ID and PIN.')) {
    $setup.style.display = 'flex';
  }
});

document.getElementById('btn-manual').addEventListener('click', () => {
  document.getElementById('manual-modal').classList.add('show');
  document.getElementById('manual-input').value = '';
  document.getElementById('manual-input').focus();
});

document.getElementById('btn-manual-cancel').addEventListener('click', () => {
  document.getElementById('manual-modal').classList.remove('show');
});

document.getElementById('btn-manual-submit').addEventListener('click', () => {
  const val = document.getElementById('manual-input').value.trim();
  if (!val) return;
  document.getElementById('manual-modal').classList.remove('show');
  processTicketId(val);
});

document.getElementById('manual-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btn-manual-submit').click();
});

// ── Counter + offline ─────────────────────────────────────────────────────────
function updateCounter() {
  document.getElementById('counter-display').textContent =
    `${STATE.checkedInCount} / ${STATE.totalCount}`;
}

function updateOfflineBadge() {
  const badge = document.getElementById('offline-badge');
  const n = STATE.offlineQueue.length;
  if (n > 0) {
    document.getElementById('offline-count').textContent = n;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// ── Offline queue retry (every 30s) ───────────────────────────────────────────
async function drainOfflineQueue() {
  if (!STATE.offlineQueue.length || !STATE.apiBase) return;
  const queue = [...STATE.offlineQueue];
  const failed = [];

  for (const item of queue) {
    try {
      await fetch(`${STATE.apiBase}/tickets/checkin`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(item),
        signal: AbortSignal.timeout(4000),
      });
      // On success, increment counter if it came back ok
    } catch (_) {
      failed.push(item);
    }
  }

  STATE.offlineQueue = failed;
  localStorage.setItem('nsmt-checkin-queue', JSON.stringify(failed));
  updateOfflineBadge();
}

setInterval(drainOfflineQueue, 30000);
</script>
</body>
</html>
