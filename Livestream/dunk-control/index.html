<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NSMT Dunk Contest Control</title>
<style>
:root{--bg:#07080a;--surf:#0e1014;--surf2:#141619;--surf3:#1a1d21;--border:#22252b;--border2:#2d3138;--text:#e8eaed;--muted:#5a606b;--gold:#F5C518;--green:#22c55e;--blue:#0E80FC;--red:#e53f3f;--r:8px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;overflow:hidden;}

.topbar{background:#000;border-bottom:2px solid var(--gold);height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;}
.tb-logo{font-size:17px;font-weight:900;letter-spacing:3px;color:var(--blue);}
.tb-div{width:1px;height:20px;background:var(--border2);}
.tb-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.tb-ws{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-left:auto;}
.tb-ws.ok{background:var(--green);}

.body{height:calc(100vh - 52px);overflow-y:auto;padding:12px 14px 24px;display:flex;flex-direction:column;gap:12px;}
.body::-webkit-scrollbar{width:3px;}
.body::-webkit-scrollbar-thumb{background:var(--border2);}

.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.card-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}

.field-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.field-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.text-input{
  width:100%;background:var(--surf3);border:1px solid var(--border2);
  color:var(--text);font-size:16px;font-weight:600;padding:9px 12px;
  border-radius:var(--r);outline:none;-webkit-appearance:none;
}
.text-input:focus{border-color:var(--gold);}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Round/Attempt steppers */
.stepper{display:flex;align-items:center;gap:10px;}
.step-btn{
  width:48px;height:48px;border:1px solid var(--border2);border-radius:var(--r);
  background:var(--surf3);color:var(--text);font-size:20px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.step-btn:active{transform:scale(.88);}
.step-val{flex:1;text-align:center;font-size:20px;font-weight:700;}

/* Overlay visibility */
.vis-row{display:flex;gap:10px;}
.vis-btn{
  flex:1;height:52px;border-radius:var(--r);border:1px solid var(--border2);
  background:var(--surf3);color:var(--muted);font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;
}
.vis-btn.active{background:rgba(34,197,94,.12);border-color:var(--green);color:var(--green);}

/* Judge scores display */
.judges-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.judge-cell{
  background:var(--surf3);border:1px solid var(--border2);border-radius:var(--r);
  padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:background .2s,border-color .2s;
}
.judge-cell.submitted{background:rgba(14,128,252,.08);border-color:rgba(14,128,252,.3);}
.judge-cell.revealed{background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.35);}
.judge-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.judge-score{font-size:28px;font-weight:900;color:var(--muted);}
.judge-cell.submitted .judge-score{color:var(--blue);}
.judge-cell.revealed .judge-score{color:var(--gold);}
.reveal-btn{
  width:100%;height:36px;border:1px solid var(--border2);border-radius:6px;
  background:var(--surf3);color:var(--muted);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .12s;letter-spacing:1px;text-transform:uppercase;
}
.reveal-btn:active{transform:scale(.92);}
.reveal-btn.ready{background:rgba(14,128,252,.12);border-color:var(--blue);color:var(--blue);}
.reveal-btn.done{background:rgba(245,197,24,.1);border-color:var(--gold);color:var(--gold);}

/* Total */
.total-strip{
  display:flex;align-items:baseline;gap:10px;padding-top:10px;border-top:1px solid var(--border);
}
.total-lbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.total-val{font-size:44px;font-weight:900;}
.total-max{font-size:13px;color:var(--muted);}

/* Action buttons */
.action-row{display:flex;gap:10px;}
.action-btn{
  flex:1;height:56px;border:none;border-radius:var(--r);
  font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:transform .12s;
}
.action-btn:active{transform:scale(.96);}
.btn-gold{background:var(--gold);color:#000;}
.btn-surf{background:var(--surf3);color:var(--text);border:1px solid var(--border2);}
.btn-red{background:var(--red);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}

/* Judge URLs helper */
.url-list{display:flex;flex-direction:column;gap:6px;}
.url-item{background:var(--surf3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;font-size:12px;word-break:break-all;}
.url-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">NSMT</div>
  <div class="tb-div"></div>
  <div class="tb-title">Dunk Contest — Head Table</div>
  <div class="tb-ws" id="wsStatus"></div>
</div>

<div class="body">

  <!-- Overlay visibility -->
  <div class="card">
    <div class="card-title">Overlay</div>
    <div class="vis-row">
      <button class="vis-btn" id="btnShow" onclick="setShow(true)">▶ Show</button>
      <button class="vis-btn" id="btnHide" onclick="setShow(false)">■ Hide</button>
    </div>
  </div>

  <!-- Dunker setup -->
  <div class="card">
    <div class="card-title">Dunker</div>
    <div class="field-row">
      <div class="field-lbl">Name</div>
      <input class="text-input" id="dunkerName" type="text" placeholder="Player name…" oninput="pushSetup()" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field-row">
      <div class="field-lbl">Photo URL (optional)</div>
      <input class="text-input" id="dunkerPhoto" type="text" placeholder="uploads/players/Name/photo.jpg" oninput="pushSetup()" autocomplete="off">
    </div>
    <div class="g2">
      <div class="field-row" style="margin-bottom:0">
        <div class="field-lbl">Round</div>
        <div class="stepper">
          <button class="step-btn" onclick="step('round',-1)">−</button>
          <div class="step-val" id="roundVal">1</div>
          <button class="step-btn" onclick="step('round',1)">+</button>
        </div>
      </div>
      <div class="field-row" style="margin-bottom:0">
        <div class="field-lbl">Attempt</div>
        <div class="stepper">
          <button class="step-btn" onclick="step('attempt',-1)">−</button>
          <div class="step-val" id="attemptVal">1</div>
          <button class="step-btn" onclick="step('attempt',1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Judge scores -->
  <div class="card">
    <div class="card-title">Judge Scores</div>
    <div class="judges-grid" id="judgesGrid"></div>
    <div class="total-strip">
      <div class="total-lbl">Total</div>
      <div class="total-val" id="totalVal">—</div>
      <div class="total-max">/50</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="action-btn btn-blue" onclick="revealAll()">Reveal All</button>
    <button class="action-btn btn-surf" onclick="resetDunk()">↺ Reset Dunk</button>
  </div>
  <div class="action-row">
    <button class="action-btn btn-red" onclick="resetAll()">New Dunker</button>
  </div>

  <!-- Judge URLs -->
  <div class="card">
    <div class="card-title">Judge Device URLs</div>
    <div class="url-list" id="judgeUrls"></div>
  </div>

</div>

<script>
  // ── State ─────────────────────────────────────────────────
  let S = {
    show:    false,
    dunker:  '',
    dunkerPhoto: '',
    round:   1,
    attempt: 1,
    scores:   [null,null,null,null,null],
    revealed: [false,false,false,false,false]
  };

  // ── WebSocket ─────────────────────────────────────────────
  const WS_HOST = location.hostname === 'localhost' ? 'localhost' : location.hostname;
  const WS_URL  = 'ws://' + WS_HOST.replace(/:\d+$/,'') + ':8765';
  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen  = () => document.getElementById('wsStatus').classList.add('ok');
    ws.onclose = () => { document.getElementById('wsStatus').classList.remove('ok'); setTimeout(connect, 2000); };
    ws.onerror = () => ws.close();
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'snapshot' || msg.type === 'state') syncFromServer(msg.data);
    };
  }

  function send(obj) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
  }

  // ── Sync from server ──────────────────────────────────────
  function syncFromServer(state) {
    const dk = state && state.bug && state.bug.dunk;
    if (!dk) return;
    if (dk.show     !== undefined) S.show        = dk.show;
    if (dk.dunker   !== undefined) S.dunker      = dk.dunker;
    if (dk.dunkerPhoto !== undefined) S.dunkerPhoto = dk.dunkerPhoto;
    if (dk.round    !== undefined) S.round       = dk.round;
    if (dk.attempt  !== undefined) S.attempt     = dk.attempt;
    if (dk.scores)   S.scores   = [...dk.scores];
    if (dk.revealed) S.revealed = [...dk.revealed];

    // Handle judge submit messages
    if (dk.judgeSubmit) {
      const { judge, score } = dk.judgeSubmit;
      if (judge >= 0 && judge < 5) S.scores[judge] = score;
    }

    document.getElementById('dunkerName').value  = S.dunker || '';
    document.getElementById('dunkerPhoto').value = S.dunkerPhoto || '';
    document.getElementById('roundVal').textContent   = S.round;
    document.getElementById('attemptVal').textContent = S.attempt;

    updateVisButtons();
    renderJudges();
  }

  // ── Push full dunk state ──────────────────────────────────
  function pushAll() {
    send({ type:'patch', bug: { dunk: {
      show:        S.show,
      dunker:      S.dunker,
      dunkerPhoto: S.dunkerPhoto,
      round:       S.round,
      attempt:     S.attempt,
      scores:      S.scores,
      revealed:    S.revealed
    }}});
  }

  function pushSetup() {
    S.dunker      = document.getElementById('dunkerName').value.trim();
    S.dunkerPhoto = document.getElementById('dunkerPhoto').value.trim();
    pushAll();
  }

  // ── Show/Hide ─────────────────────────────────────────────
  window.setShow = function(show) {
    S.show = show;
    updateVisButtons();
    pushAll();
  };
  function updateVisButtons() {
    document.getElementById('btnShow').classList.toggle('active', S.show);
    document.getElementById('btnHide').classList.toggle('active', !S.show);
  }

  // ── Round / Attempt steppers ──────────────────────────────
  window.step = function(field, delta) {
    S[field] = Math.max(1, (S[field] || 1) + delta);
    document.getElementById(field + 'Val').textContent = S[field];
    pushAll();
  };

  // ── Judge grid ────────────────────────────────────────────
  function renderJudges() {
    const grid = document.getElementById('judgesGrid');
    grid.innerHTML = S.scores.map((score, i) => {
      const hasScore  = score != null;
      const isRevealed = S.revealed[i];
      const cellCls   = 'judge-cell' + (isRevealed ? ' revealed' : hasScore ? ' submitted' : '');
      const scoreText = hasScore ? score : '—';
      const btnCls    = 'reveal-btn' + (isRevealed ? ' done' : hasScore ? ' ready' : '');
      const btnTxt    = isRevealed ? '✓ Revealed' : hasScore ? '▶ Reveal' : 'Waiting';
      return `<div class="${cellCls}">
        <div class="judge-lbl">Judge ${i+1}</div>
        <div class="judge-score">${scoreText}</div>
        <button class="${btnCls}" onclick="revealJudge(${i})" ${!hasScore && !isRevealed ? 'disabled' : ''}>${btnTxt}</button>
      </div>`;
    }).join('');

    // Total (revealed only)
    const revealed = S.scores.filter((s,i) => S.revealed[i] && s != null);
    const total    = revealed.reduce((a,b) => a+b, 0);
    document.getElementById('totalVal').textContent = revealed.length ? total : '—';
  }

  window.revealJudge = function(i) {
    if (S.scores[i] == null) return;
    S.revealed[i] = true;
    renderJudges();
    pushAll();
  };

  window.revealAll = function() {
    S.revealed = S.scores.map(s => s != null);
    renderJudges();
    pushAll();
  };

  // ── Reset ─────────────────────────────────────────────────
  window.resetDunk = function() {
    // Reset scores and revealed for next dunk attempt (keep dunker + increment attempt)
    S.scores   = [null,null,null,null,null];
    S.revealed = [false,false,false,false,false];
    renderJudges();
    pushAll();
  };

  window.resetAll = function() {
    S.dunker      = '';
    S.dunkerPhoto = '';
    S.scores      = [null,null,null,null,null];
    S.revealed    = [false,false,false,false,false];
    document.getElementById('dunkerName').value  = '';
    document.getElementById('dunkerPhoto').value = '';
    renderJudges();
    pushAll();
  };

  // ── Judge URLs helper ─────────────────────────────────────
  function renderJudgeUrls() {
    const base = location.protocol + '//' + location.host.replace('dunk-control', '').replace(/\/$/, '');
    const list = document.getElementById('judgeUrls');
    list.innerHTML = Array.from({length:5}, (_,i) => {
      const url = base + '/dunk-judge/?judge=' + (i+1);
      return `<div class="url-item"><div class="url-lbl">Judge ${i+1}</div>${url}</div>`;
    }).join('');
  }

  renderJudgeUrls();
  renderJudges();
  connect();
</script>
</body>
</html>
