<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSMT OBS Overlay</title>
<style>
/* ═══════════════════════════════════════════
   OVERLAY — 1920×1080 transparent canvas
   OBS Browser Source: 1920 x 1080, transparent BG
═══════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: transparent;
  font-family: 'Barlow', sans-serif;
}

/* ═══════════════════════
   SCORE POP CARD
═══════════════════════ */
.score-pop {
  position: absolute;
  bottom: 120px;
  left: 60px;
  width: 420px;
  display: flex;
  align-items: stretch;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.06);
  transform: translateY(140%) translateX(-20px);
  opacity: 0;
  transition: none;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,.8));
}

.score-pop.animate-in {
  animation: popIn 0.45s cubic-bezier(.22,1.6,.36,1) forwards;
}

.score-pop.animate-out {
  animation: popOut 0.35s cubic-bezier(.55,0,1,.45) forwards;
}

@keyframes popIn {
  0%   { transform: translateY(140%) translateX(-20px); opacity: 0; }
  60%  { opacity: 1; }
  100% { transform: translateY(0) translateX(0); opacity: 1; }
}

@keyframes popOut {
  0%   { transform: translateY(0) translateX(0); opacity: 1; }
  100% { transform: translateY(-30px) translateX(10px); opacity: 0; }
}

/* PHOTO PANEL */
.pop-photo-wrap {
  width: 130px;
  flex-shrink: 0;
  position: relative;
  background: #0a0a0a;
  overflow: hidden;
}

.pop-photo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}

.pop-photo-fallback {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #1a1a2e 0%, #0d0d1a 100%);
  font-family: 'Bebas Neue', cursive;
  font-size: 52px;
  color: rgba(245,197,24,.4);
  letter-spacing: 2px;
}

.pop-num-badge {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,.85) 0%, transparent 100%);
  padding: 16px 8px 8px;
  text-align: center;
  font-family: 'Bebas Neue', cursive;
  font-size: 22px;
  color: rgba(255,255,255,.7);
  letter-spacing: 1px;
  line-height: 1;
}

/* INFO PANEL */
.pop-info {
  flex: 1;
  background: #0d0d10;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* diagonal accent line */
.pop-info::before {
  content: '';
  position: absolute;
  top: 0; left: -12px; right: 0; bottom: 0;
  background: linear-gradient(135deg, #F5C518 0%, #F5C518 3px, transparent 3px);
  pointer-events: none;
}

/* gold top bar */
.pop-topbar {
  background: #F5C518;
  padding: 6px 14px 5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.pop-event-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 13px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #000;
}

.pop-team-code {
  font-family: 'Bebas Neue', cursive;
  font-size: 15px;
  letter-spacing: 2px;
  color: rgba(0,0,0,.55);
}

/* main content */
.pop-main {
  flex: 1;
  padding: 10px 14px 8px 18px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.pop-player-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 30px;
  line-height: .95;
  color: #fff;
  letter-spacing: .5px;
  text-transform: uppercase;
  word-break: break-word;
}

.pop-player-name .last {
  color: #F5C518;
}

.pop-pts-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 8px;
}

.pop-pts-num {
  font-family: 'Bebas Neue', cursive;
  font-size: 52px;
  line-height: 1;
  color: #fff;
  letter-spacing: -1px;
}

.pop-pts-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  margin-bottom: 4px;
}

.pop-pts-plus {
  font-family: 'Bebas Neue', cursive;
  font-size: 22px;
  color: #F5C518;
  margin-left: 2px;
}

/* bottom bar */
.pop-bottom {
  padding: 6px 14px 8px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,.06);
}

.pop-game-info {
  font-size: 11px;
  color: rgba(255,255,255,.3);
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
}

.pop-nsmt-logo {
  height: 18px;
  width: auto;
  opacity: .6;
  filter: brightness(0) invert(1);
}

.pop-nsmt-text {
  font-family: 'Bebas Neue', cursive;
  font-size: 15px;
  letter-spacing: 3px;
  color: rgba(255,255,255,.25);
}

/* ═══════════════════════
   PROGRESS BAR (under card)
═══════════════════════ */
.pop-progress {
  position: absolute;
  bottom: 112px;
  left: 60px;
  width: 420px;
  height: 3px;
  background: rgba(255,255,255,.08);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  transition: opacity .2s;
}

.pop-progress.visible { opacity: 1; }

.pop-progress-bar {
  height: 100%;
  background: #F5C518;
  border-radius: 2px;
  width: 100%;
  transform-origin: left;
  animation: none;
}

.pop-progress-bar.draining {
  animation: drain linear forwards;
}

@keyframes drain {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0); }
}

/* ═══════════════════════
   SCOREBOARD TICKER (top)
═══════════════════════ */
.scoreboard-bar {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(8,8,10,.88);
  border: 1px solid rgba(245,197,24,.2);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,.6);
  opacity: 0;
  transition: opacity .4s;
  backdrop-filter: blur(8px);
}

.scoreboard-bar.visible { opacity: 1; }

.sb-team-block {
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sb-team-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,.85);
}

.sb-team-score {
  font-family: 'Bebas Neue', cursive;
  font-size: 32px;
  line-height: 1;
  color: #fff;
  letter-spacing: 1px;
}

.sb-divider {
  background: rgba(245,197,24,.15);
  width: 1px;
  align-self: stretch;
}

.sb-mid {
  padding: 6px 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.sb-period {
  font-family: 'Bebas Neue', cursive;
  font-size: 14px;
  color: #F5C518;
  letter-spacing: 2px;
}

.sb-event-name {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
}

/* ═══════════════════════
   FEED LOG (right side, last 3 events)
═══════════════════════ */
.feed-log {
  position: absolute;
  top: 130px;
  right: 50px;
  width: 280px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.feed-item {
  background: rgba(8,8,10,.82);
  border-left: 3px solid #F5C518;
  border-radius: 0 6px 6px 0;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(6px);
  animation: feedSlideIn 0.3s ease forwards;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
}

.feed-item.non-score {
  border-left-color: rgba(255,255,255,.2);
}

@keyframes feedSlideIn {
  from { transform: translateX(30px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

.feed-icon { font-size: 16px; flex-shrink: 0; }

.feed-text {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,.85);
  line-height: 1.3;
}

.feed-pts {
  font-family: 'Bebas Neue', cursive;
  font-size: 18px;
  color: #F5C518;
  flex-shrink: 0;
}

/* ═══════════════════════
   DEMO MODE LABEL
═══════════════════════ */
.demo-label {
  position: fixed;
  top: 12px;
  right: 12px;
  background: rgba(230,57,70,.9);
  color: #fff;
  font-family: 'Bebas Neue', cursive;
  font-size: 14px;
  letter-spacing: 2px;
  padding: 4px 12px;
  border-radius: 4px;
  z-index: 9999;
  display: none;
}

.demo-label.show { display: block; }

/* ═══════════════════════
   PREVIEW CONTROLS
   (hidden in OBS — only visible in browser preview)
═══════════════════════ */
.preview-controls {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
}

.preview-btn {
  background: rgba(245,197,24,.9);
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 8px 14px;
  font-family: 'Bebas Neue', cursive;
  font-size: 14px;
  letter-spacing: 1px;
  cursor: pointer;
  white-space: nowrap;
}

.preview-btn.ghost {
  background: rgba(255,255,255,.1);
  color: rgba(255,255,255,.7);
  border: 1px solid rgba(255,255,255,.15);
}

</style>
</head>
<body>

<!-- DEMO MODE INDICATOR -->
<div class="demo-label" id="demoLabel">DEMO MODE</div>

<!-- ═══ TOP SCOREBOARD ═══ -->
<div class="scoreboard-bar" id="scoreboardBar">
  <div class="sb-team-block">
    <div class="sb-team-name" id="sbAwayName">AWAY</div>
    <div class="sb-team-score" id="sbAwayScore">0</div>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-mid">
    <div class="sb-period" id="sbPeriod">Q1</div>
    <div class="sb-event-name" id="sbEventName">NSMT STATS</div>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-team-block">
    <div class="sb-team-score" id="sbHomeScore">0</div>
    <div class="sb-team-name" id="sbHomeName">HOME</div>
  </div>
</div>

<!-- ═══ SCORE POP CARD ═══ -->
<div class="score-pop" id="scorePop">

  <div class="pop-photo-wrap">
    <img class="pop-photo" id="popPhoto" src="" alt="">
    <div class="pop-photo-fallback" id="popPhotoFallback" style="display:none">
      <span id="popNumFallback">—</span>
    </div>
    <div class="pop-num-badge" id="popNumBadge">#—</div>
  </div>

  <div class="pop-info">
    <div class="pop-topbar">
      <div class="pop-event-label" id="popEventLabel">FIELD GOAL</div>
      <div class="pop-team-code" id="popTeamCode">NSMT</div>
    </div>
    <div class="pop-main">
      <div class="pop-player-name" id="popPlayerName">
        <span id="popFirstName">PLAYER</span><br>
        <span class="last" id="popLastName">NAME</span>
      </div>
      <div class="pop-pts-row">
        <div class="pop-pts-num" id="popPtsNum">0</div>
        <div>
          <div class="pop-pts-plus" id="popPtsPlus">+2</div>
          <div class="pop-pts-label">PTS THIS GAME</div>
        </div>
      </div>
    </div>
    <div class="pop-bottom">
      <div class="pop-game-info" id="popGameInfo">LIVE</div>
      <div class="pop-nsmt-text">NSMT</div>
    </div>
  </div>

</div>

<!-- Progress bar -->
<div class="pop-progress" id="popProgress">
  <div class="pop-progress-bar" id="popProgressBar"></div>
</div>

<!-- ═══ EVENT FEED (right side) ═══ -->
<div class="feed-log" id="feedLog"></div>

<!-- ═══ PREVIEW CONTROLS (remove in production or hide via CSS) ═══ -->
<div class="preview-controls" id="previewControls">
  <button class="preview-btn" onclick="fireDemoScore(2)">🏀 Demo 2PT</button>
  <button class="preview-btn" onclick="fireDemoScore(3)">🎯 Demo 3PT</button>
  <button class="preview-btn" onclick="fireDemoNonScore()">⚡ Demo Steal</button>
  <button class="preview-btn ghost" onclick="toggleScoreboard()">Toggle Scoreboard</button>
  <button class="preview-btn ghost" onclick="toggleFeed()">Toggle Feed</button>
</div>

<script type="module">
// ═══════════════════════════════════════════════════════════
// FIREBASE CONFIG
// Replace with your project config (same as nsmt-stats app)
// ═══════════════════════════════════════════════════════════
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

// ═══════════════════════════════════════════════════════════
// OVERLAY SETTINGS — customize these
// ═══════════════════════════════════════════════════════════
const SETTINGS = {
  displayDuration:   4500,   // ms card stays visible
  progressDuration:  4500,   // should match above
  showScoreboard:    true,
  showFeed:          true,
  feedMaxItems:      4,
  // If you have a Google Drive folder with photos named by player ID
  // e.g. "p_123456.jpg" in a public folder — paste the base URL here
  // Leave blank to use the fallback initials display
  photoBaseUrl:      '',     // e.g. 'https://drive.google.com/uc?export=view&id='
  // Map of player ID -> Google Drive file ID for their headshot
  // e.g. { 'p_123': '1aBcDeFgHiJkL...' }
  photoMap:          {}
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let activeGameId = null;
let popTimer = null;
let progressTimer = null;
let isShowing = false;
let feedItems = [];
let lastEventId = null;
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ═══════════════════════════════════════════════════════════
// LISTEN FOR ACTIVE GAME
// Query Firestore for live games
// ═══════════════════════════════════════════════════════════
function startListening() {
  // Listen to a special "overlay_state" doc that the stats app writes to
  // This doc contains: gameId, awayName, homeName, awayScore, homeScore, period, event, lastEvent
  const overlayRef = doc(db, 'overlay', 'active');
  
  onSnapshot(overlayRef, (snap) => {
    if (!snap.exists()) {
      console.log('No active overlay state found — waiting...');
      return;
    }
    const data = snap.data();
    updateScoreboard(data);
    if (data.lastEvent && data.lastEvent.id !== lastEventId) {
      lastEventId = data.lastEvent.id;
      handleNewEvent(data.lastEvent, data);
    }
  });
}

// ═══════════════════════════════════════════════════════════
// SCOREBOARD
// ═══════════════════════════════════════════════════════════
function updateScoreboard(data) {
  document.getElementById('sbAwayName').textContent  = data.awayCode  || data.awayName  || 'AWAY';
  document.getElementById('sbHomeName').textContent  = data.homeCode  || data.homeName  || 'HOME';
  document.getElementById('sbAwayScore').textContent = data.awayScore ?? 0;
  document.getElementById('sbHomeScore').textContent = data.homeScore ?? 0;
  document.getElementById('sbPeriod').textContent    = data.period    || 'LIVE';
  document.getElementById('sbEventName').textContent = data.eventName || 'NSMT STATS';
  if (SETTINGS.showScoreboard) {
    document.getElementById('scoreboardBar').classList.add('visible');
  }
}

// ═══════════════════════════════════════════════════════════
// EVENT HANDLER
// ═══════════════════════════════════════════════════════════
function handleNewEvent(evt, gameData) {
  addToFeed(evt, gameData);

  // Only fire pop card for scoring events
  const scoringEvents = ['SHOT_2PT', 'SHOT_3PT', 'FT'];
  if (!scoringEvents.includes(evt.evt) || evt.result !== 'made') return;

  const pts     = evt.pts || (evt.evt === 'SHOT_3PT' ? 3 : evt.evt === 'FT' ? 1 : 2);
  const team    = evt.team === 'away' ? gameData.awayName : gameData.homeName;
  const code    = evt.team === 'away' ? (gameData.awayCode || gameData.awayName) : (gameData.homeCode || gameData.homeName);
  const label   = pts === 3 ? '3-POINTER' : pts === 1 ? 'FREE THROW' : 'FIELD GOAL';
  const photoId = SETTINGS.photoMap[evt.pid] || null;
  const period  = gameData.period || 'LIVE';

  fireScorePop({
    pid:        evt.pid,
    playerName: evt.playerName || 'Player',
    playerNum:  evt.playerNum  || '—',
    ptsGame:    evt.ptsGame    || pts,
    ptsAdded:   pts,
    teamCode:   code,
    eventLabel: label,
    gameInfo:   `${period} • ${gameData.eventName || 'LIVE'}`,
    photoId
  });
}

// ═══════════════════════════════════════════════════════════
// FIRE SCORE POP CARD
// ═══════════════════════════════════════════════════════════
function fireScorePop(p) {
  // cancel existing
  if (popTimer) { clearTimeout(popTimer); popTimer = null; }
  if (progressTimer) { clearTimeout(progressTimer); progressTimer = null; }

  const pop  = document.getElementById('scorePop');
  const prog = document.getElementById('popProgress');
  const bar  = document.getElementById('popProgressBar');

  // Instantly hide without animation if already showing
  if (isShowing) {
    pop.classList.remove('animate-in', 'animate-out');
    pop.style.transform = 'translateY(140%) translateX(-20px)';
    pop.style.opacity = '0';
    prog.classList.remove('visible');
  }

  // Player name split
  const nameParts = p.playerName.trim().split(' ');
  const lastName  = nameParts.pop();
  const firstName = nameParts.join(' ') || '';

  document.getElementById('popFirstName').textContent  = firstName.toUpperCase();
  document.getElementById('popLastName').textContent   = lastName.toUpperCase();
  document.getElementById('popNumBadge').textContent   = p.playerNum ? `#${p.playerNum}` : '';
  document.getElementById('popNumFallback').textContent = p.playerNum || '?';
  document.getElementById('popPtsNum').textContent     = p.ptsGame;
  document.getElementById('popPtsPlus').textContent    = `+${p.ptsAdded}`;
  document.getElementById('popEventLabel').textContent = p.eventLabel;
  document.getElementById('popTeamCode').textContent   = p.teamCode;
  document.getElementById('popGameInfo').textContent   = p.gameInfo;

  // Photo
  const photoEl       = document.getElementById('popPhoto');
  const fallbackEl    = document.getElementById('popPhotoFallback');
  const photoUrl      = resolvePhotoUrl(p.pid, p.photoId);

  if (photoUrl) {
    photoEl.src = photoUrl;
    photoEl.style.display = 'block';
    fallbackEl.style.display = 'none';
    photoEl.onerror = () => {
      photoEl.style.display = 'none';
      fallbackEl.style.display = 'flex';
    };
  } else {
    photoEl.style.display = 'none';
    fallbackEl.style.display = 'flex';
  }

  // Reset and animate in
  pop.classList.remove('animate-in', 'animate-out');
  pop.style.transform = '';
  pop.style.opacity   = '';

  // Force reflow
  void pop.offsetWidth;

  pop.classList.add('animate-in');
  isShowing = true;

  // Progress bar
  bar.classList.remove('draining');
  bar.style.animationDuration = SETTINGS.progressDuration + 'ms';
  void bar.offsetWidth;
  prog.classList.add('visible');
  bar.classList.add('draining');

  // Auto dismiss
  popTimer = setTimeout(() => {
    pop.classList.remove('animate-in');
    pop.classList.add('animate-out');
    prog.classList.remove('visible');
    isShowing = false;
    popTimer = setTimeout(() => {
      pop.classList.remove('animate-out');
    }, 400);
  }, SETTINGS.displayDuration);
}

// ═══════════════════════════════════════════════════════════
// PHOTO RESOLUTION
// ═══════════════════════════════════════════════════════════
function resolvePhotoUrl(pid, driveFileId) {
  if (driveFileId) {
    // Direct Google Drive photo link (must be shared publicly or as "Anyone with link")
    return `https://drive.google.com/thumbnail?id=${driveFileId}&sz=w400`;
  }
  if (SETTINGS.photoBaseUrl && pid) {
    return `${SETTINGS.photoBaseUrl}${pid}.jpg`;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
// EVENT FEED (right side)
// ═══════════════════════════════════════════════════════════
const eventIcons = {
  SHOT_2PT:  '🏀', SHOT_3PT: '🎯', FT: '⭕',
  OREB: '💪', DREB: '🛡️', AST: '🤝',
  STL: '⚡', BLK: '✋', TO: '💸', PF: '🚨'
};

function addToFeed(evt, gameData) {
  if (!SETTINGS.showFeed) return;

  const isScore = ['SHOT_2PT','SHOT_3PT','FT'].includes(evt.evt) && evt.result === 'made';
  const code    = evt.team === 'away' ? (gameData.awayCode || 'AWAY') : (gameData.homeCode || 'HOME');
  const icon    = eventIcons[evt.evt] || '📊';
  const name    = evt.playerName ? evt.playerName.split(' ').pop().toUpperCase() : 'PLAYER';

  feedItems.unshift({ icon, code, name, pts: evt.pts || 0, isScore, desc: evt.desc || '' });
  if (feedItems.length > SETTINGS.feedMaxItems) feedItems.pop();
  renderFeed();
}

function renderFeed() {
  const el = document.getElementById('feedLog');
  el.innerHTML = feedItems.map((item, i) => `
    <div class="feed-item ${item.isScore ? '' : 'non-score'}" style="opacity:${1 - i * 0.2}">
      <span class="feed-icon">${item.icon}</span>
      <span class="feed-text">${item.code} — ${item.name}</span>
      ${item.pts > 0 ? `<span class="feed-pts">+${item.pts}</span>` : ''}
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// DEMO FUNCTIONS (for testing without Firebase)
// ═══════════════════════════════════════════════════════════
const demoPlayers = [
  { name: 'Jymin Veney',       num: '11', pid: 'demo1', pts: 22, team: 'SJC' },
  { name: 'Jordan Taylor',     num: '21', pid: 'demo2', pts: 14, team: 'SJC' },
  { name: 'Jordan Smith',      num: '23', pid: 'demo3', pts: 16, team: 'PVI' },
  { name: 'Brian Mitchell Jr', num: '22', pid: 'demo4', pts: 13, team: 'PVI' },
];
let demoIdx = 0;

window.fireDemoScore = function(pts) {
  document.getElementById('demoLabel').classList.add('show');
  const p = demoPlayers[demoIdx % demoPlayers.length];
  demoIdx++;
  p.pts += pts;

  document.getElementById('sbAwayScore').textContent = '31';
  document.getElementById('sbHomeScore').textContent = '28';
  document.getElementById('sbAwayName').textContent  = 'SJC';
  document.getElementById('sbHomeName').textContent  = 'PVI';
  document.getElementById('sbPeriod').textContent    = 'Q3';
  document.getElementById('sbEventName').textContent = 'WCAC CHAMPIONSHIP';
  document.getElementById('scoreboardBar').classList.add('visible');

  const label = pts === 3 ? '3-POINTER' : pts === 1 ? 'FREE THROW' : 'FIELD GOAL';

  feedItems.unshift({ icon: pts === 3 ? '🎯' : '🏀', code: p.team, name: p.name.split(' ').pop().toUpperCase(), pts, isScore: true });
  if (feedItems.length > SETTINGS.feedMaxItems) feedItems.pop();
  renderFeed();

  fireScorePop({
    pid: p.pid, playerName: p.name, playerNum: p.num,
    ptsGame: p.pts, ptsAdded: pts, teamCode: p.team,
    eventLabel: label, gameInfo: `Q3 • WCAC CHAMPIONSHIP`, photoId: null
  });
};

window.fireDemoNonScore = function() {
  document.getElementById('demoLabel').classList.add('show');
  const p = demoPlayers[demoIdx % demoPlayers.length];
  demoIdx++;
  feedItems.unshift({ icon: '⚡', code: p.team, name: p.name.split(' ').pop().toUpperCase(), pts: 0, isScore: false });
  if (feedItems.length > SETTINGS.feedMaxItems) feedItems.pop();
  renderFeed();
};

window.toggleScoreboard = function() {
  document.getElementById('scoreboardBar').classList.toggle('visible');
};

window.toggleFeed = function() {
  document.getElementById('feedLog').style.display =
    document.getElementById('feedLog').style.display === 'none' ? 'flex' : 'none';
};

// ═══════════════════════════════════════════════════════════
// BOOT — check if Firebase is configured, else run demo mode
// ═══════════════════════════════════════════════════════════
if (firebaseConfig.apiKey === 'YOUR_API_KEY') {
  // Demo mode — no Firebase connected
  console.log('NSMT Overlay: Demo mode (no Firebase config)');
  document.getElementById('demoLabel').classList.add('show');
  document.getElementById('previewControls').style.display = 'flex';
  // Auto-demo on load
  setTimeout(() => window.fireDemoScore(2), 800);
} else {
  // Production mode — hide preview controls
  document.getElementById('previewControls').style.display = 'none';
  startListening();
}

</script>
